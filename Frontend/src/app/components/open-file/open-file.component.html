<button
  class="openfile-button"
  type="button"
  mat-raised-button
  color="primary"
  for="formFile"
  (click)="openFile.value = ''; openFile.click()"
  matTooltip="{{ buttonText() }}"
  [disabled]="isDisabled()"
>
  <i class="{{ buttonClass() }}"></i>
  <mat-icon> insert_drive_file</mat-icon>
  <span>{{ buttonText() }}</span>
</button>
<input
  type="file"
  id="formFile"
  [accept]="fileExtensions()"
  #openFile
  (change)="onFileSelected($event)"
  [multiple]="allowMultipleSelection()"
/>
