<div class="container">
    <div class="column">
        <div class="row pb-1">
            <app-open-file
                [buttonText]="'Select Image File'" 
                [fileExtensions]="'image/jpeg,image/jpg,image/png,image/gif'" 
                (selectedFile)="getFile($event)">
            </app-open-file>
        </div>
        <div class="row pb-1">
            @if(previewImageData() !== '') {
                <img 
                    class="preview-image ms-1" 
                    [src]="previewImageData()" 
                    alt="Preview Image" 
                    title="preview Image"
                />                
                <button                 
                    type="button" 
                    class="ms-1"
                    mat-stroked-button 
                    color="warn" 
                    (click)="removeImage()" 
                    matTooltip="Remove Image">
                        <mat-icon>remove_circle</mat-icon>
                        <span>Remove Image</span>
                </button>                       
              }
        </div>
        <div class="row pb-1">            
            <form (submit)="submit($event)">
                <div class="row">
                    <div class="column p-0 me-1">
                        <div class="row p-0">
                            <mat-form-field>
                                <mat-label>Name</mat-label>
                                <input type="text" matInput [formField]="avatarForm.name">
                            </mat-form-field>
                        </div>
                        <div class="row p-0">
                            <mat-form-field>
                                <mat-label>Age</mat-label>
                                <input type="number" matInput [formField]="avatarForm.age">
                            </mat-form-field>
                        </div>                        
                    </div>
                    <div class="column p-0">
                        <div class="row p-0">
                            <mat-form-field>
                                <mat-label>Hair Color</mat-label>
                                <mat-select [formField]="avatarForm.avatarCharacteristic!.hairColor">
                                    <mat-option value="blond">Blond</mat-option>
                                    <mat-option value="brown">Brown</mat-option>
                                    <mat-option value="red">Red</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                        <div class="row p-0">
                            <mat-form-field>
                                <mat-label>Eye Color</mat-label>
                                <mat-select [formField]="avatarForm.avatarCharacteristic!.eyeColor">
                                    <mat-option value="blue">Blue</mat-option>
                                    <mat-option value="brown">Brown</mat-option>
                                    <mat-option value="green">Green</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                        <div class="row p-0">
                            <mat-checkbox [formField]="avatarForm.avatarCharacteristic!.hasEarrings">Has Earrings?</mat-checkbox>
                        </div>
                    </div>
                </div>                
                <div class="row p-1"> 
                    <button type="submit" mat-raised-button color="primary">
                        <mat-icon>save</mat-icon>
                        <span>{{ isUpdateMode() ? 'Update' : 'Create' }}</span>
                    </button>
                </div>
            </form>
        </div>        
        @if(isUpdateMode()) {
            <div class="row p-1 ms-1"> 
                <button type="button" mat-raised-button color="warn" (click)="deleteAvatar()">
                    <mat-icon>delete</mat-icon>
                    <span>Delete Avatar</span>
                </button>
            </div>
        }    
    </div>
</div>
@if(showDialog()) {
    <app-dialog [dialog]="dialogData" (getConfirmation)="execDelete($event)"></app-dialog>
}
